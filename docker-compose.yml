# Yume dev stack — Docker Compose
# Start: docker compose -f docker-compose.dev.yml up -d
# Stop:  docker compose -f docker-compose.dev.yml down -v

name: yume-dev

services:
  # ---------------------------------------------------------------------------
  # Rust Backend — public API surface for Android
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: infra/backend/Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - YUME_LISTEN_ADDR=0.0.0.0:3000
      - YUME_ENV=development
      - OPENCODE_BASE_URL=http://opencode:4096
      - QDRANT_URL=http://qdrant:6334
      - DATABASE_URL=postgres://yume:yume_dev@postgres:5432/yume
      - KEYDB_URL=redis://keydb:6379
    depends_on:
      postgres:
        condition: service_healthy
      keydb:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    networks:
      - yume-net
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # OpenCode Server — dedicated container, private agent orchestration
  # ---------------------------------------------------------------------------
  opencode:
    build:
      context: .
      dockerfile: infra/opencode/Dockerfile
    ports:
      - "4096:4096"
    environment:
      - OPENCODE_SERVER_USERNAME=${OPENCODE_SERVER_USERNAME:-opencode}
      - OPENCODE_SERVER_PASSWORD=${OPENCODE_SERVER_PASSWORD:-yume_dev_pass}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
    volumes:
      - ./opencode-server:/opencode-config:ro
    networks:
      - yume-net
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Qdrant — vector database for RAG / memory
  # ---------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:v1.18
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6333
      - QDRANT__SERVICE__HTTP_PORT=6334
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - yume-net
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Postgres — relational data store (used with sqlx)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      - POSTGRES_DB=yume
      - POSTGRES_USER=yume
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-yume_dev}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yume -d yume"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - yume-net
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # KeyDB — Redis-compatible, multi-threaded, faster cache / rate limiter
  # ---------------------------------------------------------------------------
  keydb:
    image: eqalpha/keydb:latest
    ports:
      - "6379:6379"
    volumes:
      - keydb_data:/data
    healthcheck:
      test: ["CMD", "keydb-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - yume-net
    restart: unless-stopped

# ---------------------------------------------------------------------------
# Volumes
# ---------------------------------------------------------------------------
volumes:
  qdrant_data:
  postgres_data:
  keydb_data:

# ---------------------------------------------------------------------------
# Network
# ---------------------------------------------------------------------------
networks:
  yume-net:
    driver: bridge
